<!DOCTYPE html>
<html>
<head>
  <title>Grand Aurum </title>

  <link rel="stylesheet" href="style.css">


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
</head>

<body>


<nav class="navbar">
  <div class="logo">The Grand Aurum</div>

  <div class="nav-links">
    <a href="#hero">HOME</a>
    <a href="#rooms">ROOMS</a>
    <a href="#amenities">AMENITIES</a>
    <a href="#booking">RESERVATIONS</a>
  </div>

  <button onclick="scrollToSection('booking')">BOOK NOW</button>
</nav>


<section id="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <p class="small">WELCOME TO</p>

    <h1>The Grand Aurum</h1>

    <div class="divider">
      <span></span>
      <span class="dot"></span>
      <span></span>
    </div>

    <p class="tagline">
      Where every moment becomes an eternal memory
    </p>

    <button onclick="scrollToSection('booking')">
      RESERVE YOUR SUITE
    </button>
  </div>
</section>


<section id="rooms">
  <h2>Our Rooms</h2>

  <div class="room-container">
    <div class="room">
      <img src="room1.jpg">
      <h3>Deluxe Room</h3>
      <p>₹18,000 / night</p>
      <button onclick="openModal()">Explore</button>
    </div>

    <div class="room">
      <img src="room2.jpg">
      <h3>Premier Suite</h3>
      <p>₹32,000 / night</p>
      <button onclick="openModal()">Explore</button>
    </div>

    <div class="room">
      <img src="room3.jpg">
      <h3>Royal Suite</h3>
      <p>₹75,000 / night</p>
      <button onclick="openModal()">Explore</button>
    </div>
  </div>
</section>
<div id="modal">
  <div id="panorama"></div>
  <button onclick="closeModal()">Close</button>
</div>


<section id="amenities">
  <h2>Amenities</h2>
  <div class="card">Pool</div>
  <div class="card">Spa</div>
  <div class="card">Gym</div>
</section>


<section id="booking">

  <h4 class="sub">RESERVATIONS</h4>
  <h2>Begin Your Stay</h2>

  <form onsubmit="book(event)" class="booking-form">

    <div class="row">
      <div>
        <label>FULL NAME</label>
        <input type="text" id="name" placeholder="Your Name">
      </div>

      <div>
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="you@example.com">
      </div>
    </div>


    <div class="row">
      <div>
        <label>CHECK-IN DATE</label>
        <input type="date">
      </div>

      <div>
        <label>CHECK-OUT DATE</label>
        <input type="date">
      </div>
    </div>

    <div class="row">
      <div>
        <label>NUMBER OF GUESTS</label>
        <select>
          <option>1 Guest</option>
          <option>2 Guests</option>
        </select>
      </div>

      <div>
        <label>ROOM TYPE</label>
        <select>
          <option>Deluxe Room</option>
          <option>Premier Suite</option>
          <option>Royal Suite</option>
        </select>
      </div>
    </div>

    <div class="full">
      <label>SPECIAL REQUESTS</label>
      <textarea placeholder="Any special arrangements..."></textarea>
    </div>

    <button type="submit">Confirm Reservation</button>

  </form>

</section>

<script src="script.js"></script>
</body>
</html>
